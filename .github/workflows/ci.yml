name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default; no job in this workflow needs write scopes.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
        with:
          version: 2.5.2 # keep in lockstep with the @biomejs/biome devDependency
      - run: biome ci . # read-only; emits GitHub annotations

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run build:grammars
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bun test
      - name: Schemas are up to date
        run: |
          bun run build:schemas
          git diff --exit-code schemas/ || (echo "schemas/ is stale — run bun run build:schemas" && exit 1)
      - name: Dogfood — hibi checks its own docs (in-tree engine, read-only)
        # Runs the current tree's engine, NOT a published release, so a drift
        # this PR introduces between docs/ and src/ fails the build via hibi
        # itself (D20). Read-only: no --write. --run-verifiers executes the two
        # behavioral claims' command verifiers so the behavioral tier checks
        # itself in CI (D32). See CONTRIBUTING.md for the fix loop.
        run: bun run src/cli/index.ts check --run-verifiers --fail-on gating

  rust-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo build --examples
        working-directory: sdk/rust
