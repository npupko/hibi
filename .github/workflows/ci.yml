name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default; no job in this workflow needs write scopes.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
        with:
          version: 2.5.2 # keep in lockstep with the @biomejs/biome devDependency
      - run: biome ci . # read-only; emits GitHub annotations

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run build:grammars
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bun test
      - name: Schemas are up to date
        run: |
          bun run build:schemas
          git diff --exit-code schemas/ || (echo "schemas/ is stale — run bun run build:schemas" && exit 1)

  rust-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo build --examples
        working-directory: sdk/rust
