name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight release PR / tag

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release PR, tag, and GitHub Release
      pull-requests: write # maintain the "chore: release X.Y.Z" PR
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
