name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight release PR / tag

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # release-please needs to push tags/releases with a non-default token:
      # GITHUB_TOKEN-authored pushes never trigger other workflows (GitHub's
      # anti-recursion rule), so release.yml's `on: push: tags` would never
      # fire and npm publish would stay a manual workflow_dispatch forever.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
