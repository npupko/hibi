name: Feature request
description: Suggest an idea or enhancement for Hibi.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to Hibi. Describing the underlying
        problem first (rather than only the solution) helps us find the design that
        fits the rest of the tool. Please fill out the fields below.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what makes it hard or impossible today?
      placeholder: When I run `hibi check` in CI, I cannot ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Hibi to do? Describe the behavior, flags, or output you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or thought about.
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I searched existing issues and discussions and did not find a duplicate.
          required: true
